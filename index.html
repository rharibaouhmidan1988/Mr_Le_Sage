            "rendement": {
                keywords: ["rendement", "efficacité", "performance"],
                answer: "**RENDEMENT SOLAIRE** 📊\n\n☀️ **PHOTOVOLTAÏQUE** :\n• Rendement : 15-20%\n• Signifie : 15-20% de l'énergie solaire → électricité\n• Dépend de : température, orientation, ombres\n• ⚠️ Plus il fait chaud, moins bon le rendement !\n\n🌡️ **THERMIQUE** :\n• Rendement : 60-80%\n• Signifie : 60-80% de l'énergie solaire → chaleur\n• Meilleur rendement que PV !\n• Dépend de : isolation, température eau\n\n💡 **FACTEURS INFLUENÇANT** :\n• Orientation (plein sud idéal)\n• Inclinaison (30-35° Maroc)\n• Propreté des surfaces\n• Ombres\n• Température ambiante\n\n📊 **POURQUOI THERMIQUE > PV ?**\nTransfert direct de chaleur\nvs\nConversion lumière → électricité (pertes)"
            },
            
            // AVANTAGES
            "avantages": {
                keywords: ["avantages", "inconvénients", "points forts", "limites"],
                answer: "**AVANTAGES & INCONVÉNIENTS** ⚖️\n\n✅ **AVANTAGES COMMUNS** :\n• Énergie RENOUVELABLE inépuisable\n• Peu polluant à l'usage\n• Pas de CO2 pendant fonctionnement\n• Autonomie énergétique\n• Coûts réduits à long terme\n\n⚠️ **INCONVÉNIENTS COMMUNS** :\n• Coût d'installation élevé\n• Dépend de l'ensoleillement\n• Ne fonctionne pas la nuit\n• Besoin de grandes surfaces\n\n━━━━━━━━━━━━━━━━━━━━━━\n\n**PHOTOVOLTAÏQUE** :\n❌ Matériaux rares (silicium)\n❌ Difficile à recycler\n❌ Batteries polluantes\n\n**THERMIQUE** :\n❌ Risque de gel (besoin antigel)\n❌ Moins efficace en hiver\n❌ Système circulation nécessaire"
            }
        };
        
        // ===== FONCTIONS CHATBOT =====
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        
        function addMessage(text, isBot = true) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isBot ? 'bot' : 'user'}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = isBot ? '👨‍🏫' : '👤';
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.innerHTML = text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(bubble);
            chatMessages.appendChild(messageDiv);
            
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = 'typing';
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = '👨‍🏫';
            
            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator show';
            indicator.innerHTML = '<span></span><span></span><span></span>';
            
            typingDiv.appendChild(avatar);
            typingDiv.appendChild(indicator);
            chatMessages.appendChild(typingDiv);
            
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function hideTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }
        
        function findAnswer(question) {
            question = question.toLowerCase().trim();
            
            let bestMatch = null;
            let maxScore = 0;
            
            for (const [key, data] of Object.entries(knowledgeBase)) {
                const matchCount = data.keywords.filter(keyword => 
                    question.includes(keyword.toLowerCase())
                ).length;
                
                if (matchCount > maxScore) {
                    maxScore = matchCount;
                    bestMatch = data.answer;
                }
            }
            
            if (bestMatch && maxScore > 0) {
                return bestMatch;
            }
            
            return "🤔 Désolé, je suis spécialisé UNIQUEMENT en énergie solaire !\n\nJe peux t'aider sur :\n\n☀️⚡ **PHOTOVOLTAÏQUE** :\n• Principe de fonctionnement\n• Composants (panneaux, onduleur, batteries...)\n• Cellules photovoltaïques\n\n🌡️💧 **THERMIQUE** :\n• Principe de fonctionnement\n• Composants chauffe-eau solaire\n• Capteurs et ballon\n\n⚖️ **COMPARAISON** :\n• Différence PV vs Thermique\n• Avantages et inconvénients\n\nClique sur une suggestion ci-dessous ! ☀️";
        }
        
        function sendMessage() {
            const question = userInput.value.trim();
            if (!question) return;
            
            addMessage(question, false);
            userInput.value = '';
            
            showTyping();
            
            setTimeout(() => {
                hideTyping();
                const answer = findAnswer(question);
                addMessage(answer, true);
            }, 800);
        }
        
        function askQuestion(question) {
            userInput.value = question;
            sendMessage();
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        // Message d'accueil
        setTimeout(() => {
            addMessage("Bonjour ! ☀️\n\nJe suis Le Sage, ton expert en énergie solaire. Je connais TOUT sur le photovoltaïque et le thermique !\n\nPose-moi tes questions ou clique sur une suggestion. 🌞");
        }, 1000);
    </script>
</body>
</html>
